<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="category-title">Category</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <meta name="google-adsense-account" content="ca-pub-6814079272498306">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6814079272498306"
    crossorigin="anonymous"></script>

</head>

<body>
  <header>
    <h1 id="header-title">Category</h1>
    <div class="theme-toggle">
      <button id="lightBtn">Light</button>
      <button id="darkBtn">Dark</button>
      <button id="readingBtn">Reading</button>
    </div>
    <a href="index.html">
      <img src="assets/logo.png" class="logo" alt="Logo">
    </a>
    <a href="join.html" class="join-btn">💰 Join Us</a>
  </header>

  <div class="ad-container">
    <!-- Left Ad -->
    <div class="ad-left">
      <ins class="adsbygoogle" style="display:block;" data-ad-client="ca-pub-6814079272498306" data-ad-slot="1234567890"
        data-ad-format="vertical" data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <!-- Main Content -->
    <main>
      <div class="controls-bar"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; flex-wrap: wrap;">
        <div class="search-wrapper" style="flex: 1; min-width: 250px; position: relative;">
          <i class="fas fa-search"
            style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim-light);"></i>
          <input type="text" id="search" placeholder="Search posts..."
            style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1px solid var(--border-light); background: var(--card-light); font-family: inherit; font-size: 15px; outline: none; transition: var(--transition);">
        </div>

        <div class="pagination-controls" style="display: flex; align-items: center; gap: 10px;">
          <label for="post-limit" style="font-size: 14px; font-weight: 500; color: var(--text-dim-light);">Show:</label>
          <select id="post-limit"
            style="padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border-light); background: var(--card-light); cursor: pointer; font-family: inherit; outline: none;">
            <option value="10">10 posts</option>
            <option value="25" selected>25 posts</option>
            <option value="50">50 posts</option>
          </select>
        </div>
      </div>

      <div id="posts-container"
        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;"></div>
    </main>

    <!-- Right Ad -->
    <div class="ad-right">
      <ins class="adsbygoogle" style="display:block;" data-ad-client="ca-pub-6814079272498306" data-ad-slot="1234567890"
        data-ad-format="vertical" data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>

  <!-- Bottom Ad -->
  <div class="ad-bottom">
    <ins class="adsbygoogle" style="display:block;text-align:center;" data-ad-client="ca-pub-6814079272498306"
      data-ad-slot="5829190376" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/supabase.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // --- Theme toggle ---
      const body = document.body;
      const savedTheme = localStorage.getItem('theme') || 'light';
      body.className = savedTheme;
      const setTheme = (theme) => { body.className = theme; localStorage.setItem('theme', theme); };
      document.getElementById('lightBtn').onclick = () => setTheme('light');
      document.getElementById('darkBtn').onclick = () => setTheme('dark');
      document.getElementById('readingBtn').onclick = () => setTheme('reading');

      // --- Get category ---
      const params = new URLSearchParams(window.location.search);
      const category = params.get('category') || '';
      const formatted = category.charAt(0).toUpperCase() + category.slice(1);
      document.getElementById('header-title').textContent = formatted;
      document.getElementById('category-title').textContent = formatted;

      // --- Load posts ---
      const container = document.getElementById('posts-container');
      let currentPage = 1;
      let totalCount = 0;
      let currentSearch = '';

      async function loadPosts(searchTerm = '', page = 1) {
        const currentLimit = parseInt(document.getElementById('post-limit').value);
        currentPage = page;
        currentSearch = searchTerm;
        const offset = (page - 1) * currentLimit;
        const { posts, count } = await window.getPosts(category, searchTerm, currentLimit, offset);
        totalCount = count;
        container.innerHTML = '';

        if (!posts.length) {
          container.innerHTML = `<p>No posts found for "${searchTerm}"</p>`;
          updatePagination();
          return;
        }

        posts.forEach(post => {
          const div = document.createElement('div');
          div.classList.add('post-preview');
          div.style.cssText = `
            background: var(--card-light);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
          `;
          
          // Apply behavior on hover via JS to keep it simple, or user can update CSS
          div.onmouseover = () => { div.style.borderColor = 'var(--accent)'; div.style.transform = 'translateY(-5px)'; div.style.boxShadow = '0 10px 20px rgba(0,0,0,0.05)'; };
          div.onmouseout = () => { div.style.borderColor = 'var(--border-light)'; div.style.transform = 'translateY(0)'; div.style.boxShadow = 'none'; };

          div.innerHTML = `
            <div>
              <h2 data-id="${post.id}" class="post-link" style="font-size: 1.3rem; margin-bottom: 12px; color: var(--text-light); line-height: 1.4;">${post.heading}</h2>
              <div style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim-light);">
                <span style="background: rgba(99, 102, 241, 0.1); color: var(--accent); padding: 2px 8px; border-radius: 6px; font-weight: 600;">${post.category.toUpperCase()}</span>
                <span>•</span>
                <span>${new Date(post.published_date).toLocaleDateString()}</span>
              </div>
            </div>
            <div style="margin-top: 15px; display: flex; align-items: center; color: var(--accent); font-weight: 600; font-size: 14px;">
              Read Post <i class="fas fa-arrow-right" style="margin-left: 8px; font-size: 12px;"></i>
            </div>
          `;
          div.onclick = () => { window.location.href = `post.html?id=${post.id}&category=${category}`; };
          container.appendChild(div);
        });

        document.querySelectorAll('.post-link').forEach(el => {
          el.addEventListener('click', () => {
            window.location.href = `post.html?id=${el.dataset.id}&category=${category}`;
          });
        });

        updatePagination();
      }

      function updatePagination() {
        const currentLimit = parseInt(document.getElementById('post-limit').value);
        const totalPages = Math.ceil(totalCount / currentLimit);
        const start = (currentPage - 1) * currentLimit + 1;
        const end = Math.min(currentPage * currentLimit, totalCount);

        let paginationHtml = `<div id="pagination" style="grid-column: 1 / -1; margin-top: 40px; padding: 20px; border-top: 1px solid var(--border-light); text-align: center;">`;
        
        if (totalCount > 0) {
          paginationHtml += `
            <div style="margin-bottom: 20px; font-size: 14px; color: var(--text-dim-light);">
              Showing <strong>${start} to ${end}</strong> of <strong>${totalCount}</strong> posts
            </div>
          `;
        }

        paginationHtml += `<div style="display: flex; justify-content: center; gap: 10px; align-items: center;">`;
        
        if (currentPage > 1) {
          paginationHtml += `<button id="prev-btn" style="padding: 10px 20px; background: var(--card-light); border: 1px solid var(--border-light); border-radius: 10px; cursor: pointer; font-weight: 600; color: var(--text-light); transition: var(--transition);"><i class="fas fa-chevron-left"></i> Previous</button>`;
        }

        if (totalPages > 1) {
          paginationHtml += `<span style="font-size: 14px; font-weight: 600; color: var(--text-light); margin: 0 15px;">Page ${currentPage} of ${totalPages}</span>`;
        }
        
        if (currentPage < totalPages) {
          paginationHtml += `<button id="next-btn" style="padding: 10px 20px; background: var(--card-light); border: 1px solid var(--border-light); border-radius: 10px; cursor: pointer; font-weight: 600; color: var(--text-light); transition: var(--transition);">Next <i class="fas fa-chevron-right"></i></button>`;
        }

        paginationHtml += `</div></div>`;

        // Remove existing pagination if any
        const oldPag = document.getElementById('pagination');
        if (oldPag) oldPag.remove();

        const parser = new DOMParser();
        const doc = parser.parseFromString(paginationHtml, 'text/html');
        const paginationDiv = doc.getElementById('pagination');
        container.appendChild(paginationDiv);

        // Add event listeners
        const prevBtn = document.getElementById('prev-btn');
        if (prevBtn) prevBtn.onclick = () => loadPosts(currentSearch, currentPage - 1);

        const nextBtn = document.getElementById('next-btn');
        if (nextBtn) nextBtn.onclick = () => loadPosts(currentSearch, currentPage + 1);

        // Add back button at bottom
        const backBtn = document.createElement('a');
        backBtn.href = 'index.html';
        backBtn.innerHTML = '<i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back to Categories';
        backBtn.style.cssText = 'display:inline-block; margin-top:30px; padding:12px 24px; background: var(--card-light); border: 1px solid var(--border-light); border-radius: 12px; color: var(--text-light); text-decoration: none; font-weight: 600; transition: var(--transition);';
        
        const footerCenter = document.createElement('div');
        footerCenter.style.textAlign = 'center';
        footerCenter.appendChild(backBtn);
        container.appendChild(footerCenter);
      }

      loadPosts();

      document.getElementById('search').addEventListener('input', e => {
        loadPosts(e.target.value, 1);
      });

      document.getElementById('post-limit').addEventListener('change', () => {
        loadPosts(currentSearch, 1);
      });
    });
  </script>
  <footer style="padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-light); margin-top: 40px; color: var(--text-dim-light);">
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 20px;">
      <a href="https://github.com/aman7263" style="color: inherit;" target="_blank"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/aman7263/" style="color: inherit;" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="mailto:amanaryan7263@gmail.com" style="color: inherit;"><i class="fas fa-envelope"></i></a>
    </div>
    <p>&copy; 2026 Aman Aryan. All rights reserved.</p>
  </footer>
</body>

</html>
