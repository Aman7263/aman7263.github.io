<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <meta name="google-adsense-account" content="ca-pub-6814079272498306"> 

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6814079272498306"
crossorigin="anonymous"></script>

</head>
<body>
  <header>
    <h1 id="post-title">Post Title</h1>
    <div class="theme-toggle">
      <button id="lightBtn">Light</button>
      <button id="darkBtn">Dark</button>
      <button id="readingBtn">Reading</button>
    </div>
    <a href="index.html">
  <img src="assets/logo.png" class="logo" alt="Logo">
</a>
    <a href="join.html" class="join-btn">💰 Join Us</a>
  </header>

  <div class="ad-container">
    <!-- Left Ad -->
    <div class="ad-left">
      <ins class="adsbygoogle"
        style="display:block;"
        data-ad-client="ca-pub-6814079272498306"
        data-ad-slot="1234567890"
        data-ad-format="vertical"
        data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <!-- Main Content -->
    <main id="post-content" style="max-width:760px;margin:auto;padding:10px;">Loading...</main>

    <!-- Right Ad -->
    <div class="ad-right">
      <ins class="adsbygoogle"
        style="display:block;"
        data-ad-client="ca-pub-6814079272498306"
        data-ad-slot="1234567890"
        data-ad-format="vertical"
        data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>

  <!-- Bottom Ad -->
  <div class="ad-bottom">
    <ins class="adsbygoogle"
      style="display:block;text-align:center;"
      data-ad-client="ca-pub-6814079272498306"
      data-ad-slot="5829190376"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/supabase.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // --- Theme toggle ---
      const body = document.body;
      const savedTheme = localStorage.getItem('theme') || 'light';
      body.className = savedTheme;
      const setTheme = (theme) => { body.className = theme; localStorage.setItem('theme', theme); };
      document.getElementById('lightBtn').onclick = () => setTheme('light');
      document.getElementById('darkBtn').onclick = () => setTheme('dark');
      document.getElementById('readingBtn').onclick = () => setTheme('reading');

      // --- Get post info ---
      const params = new URLSearchParams(window.location.search);
      const postId = params.get('id');
      const category = params.get('category') || 'kids';

      const post = await window.getPostById(category, postId);
      const container = document.getElementById('post-content');

      if (!post) {
        container.innerHTML = `<p>Post not found.</p>`;
        return;
      }

      container.innerHTML = `
        <div class="post-metadata" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 35px; gap: 15px;">
          <div class="category-badge" style="display: flex; align-items: center; gap: 8px; background: rgba(99, 102, 241, 0.1); color: var(--accent); padding: 6px 16px; border-radius: 100px; font-weight: 600; font-size: 14px;">
            <i class="fas fa-tag"></i>
            <span style="text-transform: uppercase; letter-spacing: 1px;">${category}</span>
          </div>
          
          <h1 style="text-align:center; font-size: 2.5rem; line-height: 1.2; margin: 0;">${post.heading}</h1>
          
          <div style="display: flex; align-items: center; gap: 12px; opacity: 0.8; font-size: 14px;">
            <span style="display: flex; align-items: center; gap: 5px;">
              <i class="far fa-calendar-alt"></i>
              ${new Date(post.published_date).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })}
            </span>
            <span>•</span>
            <span style="display: flex; align-items: center; gap: 5px;">
              <i class="far fa-clock"></i>
              ${new Date(post.published_date).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })}
            </span>
          </div>
        </div>

        <div class="article-body" style="font-size: 1.1rem; line-height: 1.8;">
          ${post.content}
        </div>

        <div style="margin-top:50px; padding-top:30px; border-top:1px solid var(--border-light); display: flex; flex-direction: column; align-items: center; gap: 15px;">
          <a href="category.html?category=${category}" style="display: flex; align-items: center; gap: 10px; color: var(--accent); text-decoration: none; font-weight: 600;">
            <i class="fas fa-arrow-left"></i> Back to ${category.charAt(0).toUpperCase() + category.slice(1)}
          </a>
          <a href="index.html" style="display: flex; align-items: center; gap: 10px; opacity: 0.6; text-decoration: none; font-weight: 500; font-size: 14px;">
            Explore all categories
          </a>
        </div>
      `;
    });
  </script>
  <footer style="padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-light); margin-top: 40px; color: var(--text-dim-light);">
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 20px;">
      <a href="https://github.com/aman7263" style="color: inherit;" target="_blank"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/aman7263/" style="color: inherit;" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="mailto:amanaryan7263@gmail.com" style="color: inherit;"><i class="fas fa-envelope"></i></a>
    </div>
    <p>&copy; 2026 Aman Aryan. All rights reserved.</p>
  </footer>
</body>
</html>
