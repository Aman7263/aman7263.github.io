<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <meta name="google-adsense-account" content="ca-pub-6814079272498306"> 

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6814079272498306"
crossorigin="anonymous"></script>

</head>
<body>
  <header>
    <h1 id="post-title">Post Title</h1>
    <div class="theme-toggle">
      <button id="lightBtn">Light</button>
      <button id="darkBtn">Dark</button>
      <button id="readingBtn">Reading</button>
    </div>
    <a href="index.html">
  <img src="assets/logo.png" class="logo" alt="Logo">
</a>
    <a href="join.html" class="join-btn">💰 Join Us</a>
  </header>

  <div class="ad-container">
    <!-- Left Ad -->
    <div class="ad-left">
      <ins class="adsbygoogle"
        style="display:block;"
        data-ad-client="ca-pub-6814079272498306"
        data-ad-slot="1234567890"
        data-ad-format="vertical"
        data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <!-- Main Content -->
    <main id="post-content" style="max-width:760px;margin:auto;padding:10px;">Loading...</main>

    <!-- Right Ad -->
    <div class="ad-right">
      <ins class="adsbygoogle"
        style="display:block;"
        data-ad-client="ca-pub-6814079272498306"
        data-ad-slot="1234567890"
        data-ad-format="vertical"
        data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>

  <!-- Bottom Ad -->
  <div class="ad-bottom">
    <ins class="adsbygoogle"
      style="display:block;text-align:center;"
      data-ad-client="ca-pub-6814079272498306"
      data-ad-slot="5829190376"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/supabase.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // --- Theme toggle ---
      const body = document.body;
      const savedTheme = localStorage.getItem('theme') || 'light';
      body.className = savedTheme;
      const setTheme = (theme) => { body.className = theme; localStorage.setItem('theme', theme); };
      document.getElementById('lightBtn').onclick = () => setTheme('light');
      document.getElementById('darkBtn').onclick = () => setTheme('dark');
      document.getElementById('readingBtn').onclick = () => setTheme('reading');

      // --- Get post info ---
      const params = new URLSearchParams(window.location.search);
      const postId = params.get('id');
      const category = params.get('category') || 'kids';

      const post = await window.getPostById(category, postId);
      const container = document.getElementById('post-content');

      if (!post) {
        container.innerHTML = `<p>Post not found.</p>`;
        return;
      }

      container.innerHTML = `
        <style>
          /* Aggressively override all nested element styles from the database content */
          .article-body, .article-body * {
            background-color: transparent !important;
            color: inherit !important;
            border-color: var(--border-light) !important;
          }
          body.dark .article-body, body.dark .article-body * {
            border-color: var(--border-dark) !important;
            color: var(--text-dark) !important;
          }
          body.reading .article-body, body.reading .article-body * {
            color: #433422 !important;
          }
        </style>
        <div class="post-metadata" style="display: flex; flex-direction: column; align-items: center; margin: 40px 0; padding: 0 20px;">
          <!-- Professional Category Badge -->
          <div class="category-badge" style="
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            background: rgba(99, 102, 241, 0.15); 
            color: var(--accent); 
            padding: 8px 20px; 
            border-radius: 100px; 
            border: 1px solid rgba(99, 102, 241, 0.3);
            font-weight: 700; 
            font-size: 14px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
          ">
            <i class="fas fa-rocket"></i>
            <span>${category.replace('_', ' ')}</span>
          </div>
          
          <h1 style="
            text-align: center; 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            line-height: 1.1; 
            margin-bottom: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          ">${post.heading}</h1>
          
          <div style="
            display: flex; 
            align-items: center; 
            gap: 15px; 
            opacity: 0.7; 
            font-size: 15px;
            font-weight: 500;
          ">
            <span style="display: flex; align-items: center; gap: 6px;">
              <i class="far fa-calendar-alt"></i>
              ${new Date(post.published_date).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })}
            </span>
            <span style="opacity: 0.3;">|</span>
            <span style="display: flex; align-items: center; gap: 6px;">
              <i class="far fa-clock"></i>
              ${new Date(post.published_date).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })}
            </span>
          </div>
        </div>

        <div class="article-body" style="
          font-size: 1.2rem; 
          line-height: 1.9; 
          padding: 0 10px;
          margin-bottom: 60px;
        ">
          ${post.content}
        </div>

        <div style="
          margin-top: 60px; 
          padding: 40px 20px; 
          border-top: 1px solid var(--border-light); 
          display: flex; 
          flex-direction: column; 
          align-items: center; 
          gap: 20px;
          background: rgba(99, 102, 241, 0.03);
          border-radius: 20px;
        ">
          <p style="font-weight: 600; font-size: 18px; margin-bottom: 5px;">Enjoyed this story?</p>
          <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
            <a href="category.html?category=${category}" class="btn-secondary" style="
              display: flex; align-items: center; gap: 10px; padding: 12px 25px; border-radius: 12px; font-weight: 600; text-decoration: none; border: 1px solid var(--border-light); color: inherit; transition: 0.3s;
            ">
              <i class="fas fa-th-large"></i> More in ${category}
            </a>
            <a href="index.html" class="btn-primary" style="
              display: flex; align-items: center; gap: 10px; padding: 12px 25px; background: var(--accent); color: white; border-radius: 12px; font-weight: 600; text-decoration: none; transition: 0.3s;
            ">
              <i class="fas fa-home"></i> Browse All
            </a>
          </div>
        </div>
      `;
    });
  </script>
  <footer style="padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-light); margin-top: 40px; color: var(--text-dim-light);">
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 20px;">
      <a href="https://github.com/aman7263" style="color: inherit;" target="_blank"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/aman7263/" style="color: inherit;" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="mailto:amanaryan7263@gmail.com" style="color: inherit;"><i class="fas fa-envelope"></i></a>
    </div>
    <p>&copy; 2026 Aman Aryan. All rights reserved.</p>
  </footer>
</body>
</html>
