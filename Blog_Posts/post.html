<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post</title>
  <link rel="stylesheet" href="css/style.css">

  <meta name="google-adsense-account" content="ca-pub-6814079272498306">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6814079272498306"
crossorigin="anonymous"></script>

</head>
<body>
  <header>
    <h1 id="post-title">Post Title</h1>
    <div class="theme-toggle">
      <button id="lightBtn">Light</button>
      <button id="darkBtn">Dark</button>
      <button id="readingBtn">Reading</button>
    </div>
    <img src="assets/logo.png" class="logo" alt="Logo">
    <a href="join.html" class="join-btn">💰 Join Us</a>
  </header>

  <div class="ad-container">
    <!-- Left Ad -->
    <div class="ad-left">
      <ins class="adsbygoogle"
        style="display:block;"
        data-ad-client="ca-pub-6814079272498306"
        data-ad-slot="1234567890"
        data-ad-format="vertical"
        data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <!-- Main Content -->
    <main id="post-content" style="max-width:760px;margin:auto;padding:10px;">Loading...</main>

    <!-- Right Ad -->
    <div class="ad-right">
      <ins class="adsbygoogle"
        style="display:block;"
        data-ad-client="ca-pub-6814079272498306"
        data-ad-slot="1234567890"
        data-ad-format="vertical"
        data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>

  <!-- Bottom Ad -->
  <div class="ad-bottom">
    <ins class="adsbygoogle"
      style="display:block;text-align:center;"
      data-ad-client="ca-pub-6814079272498306"
      data-ad-slot="5829190376"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/supabase.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // --- Theme toggle ---
      const body = document.body;
      const savedTheme = localStorage.getItem('theme') || 'light';
      body.className = savedTheme;
      const setTheme = (theme) => { body.className = theme; localStorage.setItem('theme', theme); };
      document.getElementById('lightBtn').onclick = () => setTheme('light');
      document.getElementById('darkBtn').onclick = () => setTheme('dark');
      document.getElementById('readingBtn').onclick = () => setTheme('reading');

      // --- Get post info ---
      const params = new URLSearchParams(window.location.search);
      const postId = params.get('id');
      const category = params.get('category') || 'kids';

      const post = await window.getPostById(category, postId);
      const container = document.getElementById('post-content');

      if (!post) {
        container.innerHTML = `<p>Post not found.</p>`;
        return;
      }

      container.innerHTML = `
        <h1 style="text-align:center; color:#2c3e50; margin-bottom:20px;">${post.heading}</h1>
        ${post.content}
        <div style="margin-top:40px;padding-top:20px;border-top:1px solid #ddd;font-style:italic;color:#777;text-align:center;">
          📅 Published on ${new Date(post.published_date).toLocaleString()}
        </div>
        <div style="margin-top:30px;text-align:center;">
          <a href="category.html?category=${category}" style="color:#3498db;text-decoration:none;font-weight:bold;">← Back to ${category.charAt(0).toUpperCase() + category.slice(1)}</a>
        </div>
      `;
      // document.getElementById('post-title').textContent = post.heading;
    });
  </script>
</body>
</html>
